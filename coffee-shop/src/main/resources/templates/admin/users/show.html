<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<th:block th:replace="~{fragment/head :: meta}"></th:block>

	<title>会員詳細 | コーヒー豆通販サイト</title>

	<th:block th:replace="~{fragment/head :: styles}"></th:block>
</head>

<body class="coffee-wrapper">

	<!-- ヘッダー -->
	<div th:replace="~{fragment/header :: header}"></div>

	<div class="container mt-5">

		<h2 class="text-center mb-4">
			会員詳細
		</h2>

		<div class="row justify-content-center">

			<div class="col-md-8">

				<div class="card shadow-sm">

					<div class="card-body">

						<table class="table">

							<tr>
								<th width="30%">会員ID</th>
								<td th:text="${user.id}"></td>
							</tr>

							<tr>
								<th>氏名</th>
								<td th:text="${user.name}"></td>
							</tr>

							<tr>
								<th>フリガナ</th>
								<td th:text="${user.furigana}"></td>
							</tr>

							<tr>
								<th>郵便番号</th>
								<td th:text="${user.postalCode}"></td>
							</tr>

							<tr>
								<th>住所</th>
								<td th:text="${user.address}"></td>
							</tr>

							<tr>
								<th>電話番号</th>
								<td th:text="${user.phoneNumber}"></td>
							</tr>

							<tr>
								<th>メールアドレス</th>
								<td th:text="${user.email}"></td>
							</tr>

							<tr>
								<th>アカウント状態</th>

								<td>
									<span th:if="${user.enabled}" class="badge bg-success">
										利用中
									</span>

									<span th:unless="${user.enabled}" class="badge bg-danger">
										利用停止
									</span>
								</td>
							</tr>

							<tr>
								<th>権限</th>
								<td th:text="${user.role.roleName}"></td>
							</tr>

						</table>

						<div class="d-flex justify-content-between mt-4">

							<a th:href="@{/admin/users}" class="btn btn-secondary">
								一覧へ戻る
							</a>

							<div>

								<form th:if="${user.enabled}" th:action="@{/admin/users/{id}/disable(id=${user.id})}"
									method="post" style="display:inline;">

									<button type="submit" class="btn btn-danger">
										利用停止
									</button>

								</form>

								<form th:unless="${user.enabled}" th:action="@{/admin/users/{id}/enable(id=${user.id})}"
									method="post" style="display:inline;">

									<button type="submit" class="btn btn-success">
										利用再開
									</button>

								</form>

							</div>

						</div>

					</div>

				</div>

			</div>

		</div>

	</div>

	<!-- フッター -->
	<div th:replace="~{fragment/footer :: footer}"></div>

</body>

</html>

<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<th:block th:replace="~{fragment/head :: meta}"></th:block>

	<title>商品編集 | コーヒー豆通販サイト</title>

	<th:block th:replace="~{fragment/head :: styles}"></th:block>
</head>

<body class="coffee-wrapper">

	<!-- ヘッダー -->
	<div th:replace="~{fragment/header :: header}"></div>

	<div class="container mt-5">

		<h2 class="text-center mb-4">
			商品編集
		</h2>

		<div class="row justify-content-center">

			<div class="col-md-8">

				<div class="card shadow-sm">

					<div class="card-body">

						<form th:action="@{/admin/products/{id}/update(id=${productEditForm.id})}"
							th:object="${productEditForm}" method="post" enctype="multipart/form-data">

							<input type="hidden" th:field="*{id}">

							<!-- 商品名 -->
							<div class="mb-3">
								<label class="form-label">商品名</label>

								<input type="text" th:field="*{productName}" class="form-control">

								<div class="text-danger" th:errors="*{productName}">
								</div>
							</div>

							<!-- 原産地 -->
							<div class="mb-3">
								<label class="form-label">原産地</label>

								<input type="text" th:field="*{origin}" class="form-control">

								<div class="text-danger" th:errors="*{origin}">
								</div>
							</div>

							<!-- 焙煎度 -->
							<div class="mb-3">
								<label class="form-label">焙煎度</label>

								<input type="text" th:field="*{roastLevel}" class="form-control">

								<div class="text-danger" th:errors="*{roastLevel}">
								</div>
							</div>

							<!-- 商品説明 -->
							<div class="mb-3">
								<label class="form-label">商品説明</label>

								<textarea th:field="*{description}" class="form-control" rows="5"></textarea>

								<div class="text-danger" th:errors="*{description}">
								</div>
							</div>

							<!-- 価格 -->
							<div class="mb-3">
								<label class="form-label">
									価格（100gあたり）
								</label>

								<input type="number" th:field="*{price}" class="form-control">

								<div class="text-danger" th:errors="*{price}">
								</div>
							</div>

							<!-- 現在の画像 -->
							<div class="mb-3" th:if="${imageName != null}">

								<label class="form-label">
									現在の画像
								</label>

								<div>
									<img th:src="@{/storage/{file}(file=${imageName})}" class="img-thumbnail"
										style="max-width: 250px;">
								</div>

							</div>

							<!-- 新しい画像 -->
							<div class="mb-4">

								<label class="form-label">
									画像変更
								</label>

								<input type="file" th:field="*{imageFile}" class="form-control">

							</div>

							<div class="d-flex justify-content-between">

								<a th:href="@{/admin/products}" class="btn btn-secondary">
									戻る
								</a>

								<button type="submit" class="btn coffee-btn">
									更新する
								</button>

							</div>

						</form>

					</div>

				</div>

			</div>

		</div>

	</div>

	<!-- フッター -->
	<div th:replace="~{fragment/footer :: footer}"></div>

</body>

</html>

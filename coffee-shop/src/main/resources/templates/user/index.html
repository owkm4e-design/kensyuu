<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<th:block th:replace="~{fragment/head :: meta}"></th:block>

	<title>マイページ | コーヒー豆通販サイト</title>

	<th:block th:replace="~{fragment/head :: styles}"></th:block>
</head>

<body class="coffee-wrapper">

	<!-- ヘッダー -->
	<div th:replace="~{fragment/header :: header}"></div>

	<div class="container mt-5">

		<h2 class="text-center mb-4">
			マイページ
		</h2>

		<!-- 更新成功メッセージ -->
		<div class="row justify-content-center" th:if="${successMessage}">

			<div class="col-md-8">

				<div class="alert alert-success">
					<span th:text="${successMessage}"></span>
				</div>

			</div>

		</div>

		<div class="row justify-content-center">

			<div class="col-md-8">

				<div class="card shadow-sm">

					<div class="card-body">

						<h4 class="card-title mb-4">
							会員情報
						</h4>

						<table class="table">

							<tr>
								<th width="30%">氏名</th>
								<td th:text="${user.name}"></td>
							</tr>

							<tr>
								<th>フリガナ</th>
								<td th:text="${user.furigana}"></td>
							</tr>

							<tr>
								<th>郵便番号</th>
								<td th:text="${user.postalCode}"></td>
							</tr>

							<tr>
								<th>住所</th>
								<td th:text="${user.address}"></td>
							</tr>

							<tr>
								<th>電話番号</th>
								<td th:text="${user.phoneNumber}"></td>
							</tr>

							<tr>
								<th>メールアドレス</th>
								<td th:text="${user.email}"></td>
							</tr>

						</table>

						<div class="text-center mt-4">

							<a th:href="@{/user/edit}" class="btn coffee-btn">
								会員情報を編集する
							</a>

						</div>

					</div>

				</div>

			</div>

		</div>

	</div>

	<!-- フッター -->
	<div th:replace="~{fragment/footer :: footer}"></div>

</body>

</html>

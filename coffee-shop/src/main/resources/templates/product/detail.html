<body class="coffee-wrapper">

	<!-- ヘッダー -->
	<div th:replace="~{fragment/header :: header}"></div>


	<div class="container">

		<a th:href="@{/product}" class="btn btn-outline-secondary mb-4">
			← 商品一覧へ戻る</a>

		<div class="row">

			<!-- 商品画像 -->
			<div class="col-md-6">
				<img th:src="@{/storage/{file}(file=${product.imageFileName})}" th:alt="${product.productName}"
					class="img-fluid coffee-product-detail-image rounded shadow">
			</div>

			<!-- 商品情報 -->
			<div class="col-md-6">

				<h1 class="mb-3" th:text="${product.productName}"></h1>

				<p>
					<strong>原産地：</strong>
					<span th:text="${product.origin}"></span>
				</p>

				<p>
					<strong>焙煎度：</strong>
					<span th:text="${product.roastLevel}"></span>
				</p>

				<p class="mb-4" th:text="${product.description}"></p>

				<h3 class="coffee-price">
					¥<span th:text="${product.price}"></span>/100g
				</h3>

				<hr>

				<form th:action="@{/cart/add}" method="post">

					<input type="hidden" name="productId" th:value="${product.id}">

					<div class="mb-3">
						<label class="form-label">内容量</label>

						<select name="gram" class="form-select">
							<option value="100">100g</option>
							<option value="200">200g</option>
							<option value="300">300g</option>
							<option value="500">500g</option>
						</select>
					</div>

					<div class="mb-3">
						<label class="form-label">数量</label>

						<input type="number" name="quantity" value="1" min="1" class="form-control">
					</div>

					<button type="submit" class="btn coffee-btn">
						カートに追加
					</button>

				</form>

			</div>

		</div>

	</div>

	<!-- フッター -->
	<div th:replace="~{fragment/footer :: footer}"></div>

</body>

</html>

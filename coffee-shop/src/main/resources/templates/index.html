<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>コーヒー豆通販サイト</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<style>
		.hero {
			background-image: url('/images/coffee-main.jpg');
			background-size: cover;
			background-position: center;
			color: white;
			padding: 120px 0;
			text-align: center;
		}

		.product-image {
			height: 250px;
			object-fit: cover;
		}

		.section-title {
			margin-top: 50px;
			margin-bottom: 30px;
		}
	</style>
</head>

<body>

	<!-- ヘッダー -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container">
			<a class="navbar-brand" href="/">Coffee Shop</a>

			<div class="ms-auto">
				<a href="/cart" class="btn btn-outline-light">
					カート
				</a>
			</div>
		</div>
	</nav>

	<!-- メイン画像 -->
	<section class="hero">
		<div class="container">
			<h1 class="display-4 fw-bold">
				世界の厳選コーヒー豆
			</h1>

			<p class="lead">
				焙煎したての香りをご自宅へ
			</p>
		</div>
	</section>

	<!-- 商品一覧 -->
	<div class="container">

		<h2 class="section-title">おすすめ商品</h2>

		<div class="row">

			<div class="col-md-4 mb-4" th:each="product : ${products}">

				<div class="card h-100 shadow-sm">

					<img class="card-img-top product-image" th:src="@{/images/{file}(file=${product.imageFileName})}"
						alt="商品画像">

					<div class="card-body">

						<h5 class="card-title" th:text="${product.productName}">
							商品名
						</h5>

						<p class="card-text">
							原産地：
							<span th:text="${product.origin}">
								ブラジル
							</span>
						</p>

						<p class="card-text">
							焙煎度：
							<span th:text="${product.roastLevel}">
								中煎り
							</span>
						</p>

						<p class="fw-bold text-danger">
							<span th:text="${product.pricePer100g}">
								800
							</span>
							円 / 100g
						</p>

					</div>

					<div class="card-footer bg-white border-0">
						<a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-primary w-100">
							商品詳細
						</a>
					</div>

				</div>

			</div>

		</div>

	</div>

	<!-- フッター -->
	<footer class="bg-dark text-white text-center mt-5 py-3">
		<p class="mb-0">
			© 2026 Coffee Shop
		</p>
	</footer>

</body>

</html>

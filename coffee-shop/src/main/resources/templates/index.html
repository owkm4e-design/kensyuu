<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<th:block th:replace="~{fragment/head :: meta}"></th:block>

	<title>コーヒー豆通販サイト</title>

	<th:block th:replace="~{fragment/head :: meta}"></th:block>
</head>

<body class="coffee-wrapper">

	<!-- ヘッダー -->
	<div th:replace="fragment/header :: header"></div>

	<!-- メイン -->
	<section class="hero text-center">
		<div class="container">
			<h1 class="display-4 fw-bold">
				世界の厳選コーヒー豆
			</h1>

			<p class="lead">
				焙煎したての香りをご自宅へ
			</p>
		</div>
	</section>

	<!-- 商品一覧 -->
	<div class="container mt-5">

		<h2 class="mb-4">おすすめ商品</h2>

		<div class="row">

			<div class="col-md-4 mb-4" th:each="product : ${products}">

				<div class="card h-100 coffee-card-link">

					<img class="card-img-top coffee-product-image"
						th:src="@{/storage/{file}(file=${product.imageFileName})}">

					<div class="card-body">

						<h5 class="card-title" th:text="${product.productName}">
							商品名
						</h5>

						<p class="card-text">
							原産地：
							<span th:text="${product.origin}">
								ブラジル
							</span>
						</p>

						<p class="card-text">
							焙煎度：
							<span th:text="${product.roastLevel}">
								中煎り
							</span>
						</p>

						<p class="fw-bold text-danger">
							<span th:text="${product.price}">
								800
							</span>
							円 / 100g
						</p>

					</div>

					<div class="card-footer bg-white border-0">
						<a th:href="@{/products/{id}(id=${product.id})}" class="btn coffee-btn w-100">
							商品詳細
						</a>
					</div>

				</div>

			</div>

		</div>

	</div>

	<!-- フッター -->
	<div th:replace="fragment/footer :: footer"></div>

</body>

</html>

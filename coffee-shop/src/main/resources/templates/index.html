<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>コーヒー豆通販サイト</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="/css/style.css">
</head>

<body class="coffee-wrapper">

	<!-- ヘッダー -->
	<div th:replace="fragment/header :: header"></div>

	<!-- メイン -->
	<section class="hero text-center text-white">
		<div class="container">
			<h1 class="display-4 fw-bold">
				世界の厳選コーヒー豆
			</h1>

			<p class="lead">
				焙煎したての香りをご自宅へ
			</p>
		</div>
	</section>

	<!-- 商品一覧 -->
	<div class="container mt-5">

		<h2 class="mb-4">おすすめ商品</h2>

		<div class="row">

			<div class="col-md-4 mb-4" th:each="product : ${products}">

				<div class="card h-100 coffee-card-link">

					<img class="card-img-top coffee-product-image"
						th:src="@{/storage/{file}(file=${product.imageFileName})}">

					<div class="card-body">

						<h5 th:text="${product.productName}"></h5>

						<p class="coffee-origin">
							原産地：<span th:text="${product.origin}"></span>
						</p>

						<p class="coffee-roast">
							<span th:text="${product.roastLevel}"></span>
						</p>

						<p class="coffee-price">
							<span th:text="${product.price}"></span>円 / 100g
						</p>

					</div>

					<div class="card-footer bg-white border-0">
						<a th:href="@{/product/{id}(id=${product.id})}" class="btn coffee-btn w-100">
							商品詳細
						</a>
					</div>

				</div>

			</div>

		</div>

	</div>

	<!-- フッター -->
	<div th:replace="fragment/footer :: footer"></div>

</body>

</html>

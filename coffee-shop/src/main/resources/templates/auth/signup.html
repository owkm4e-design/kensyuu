<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>

	<th:block th:replace="~{fragment/head :: meta}"></th:block>

	<title>会員登録 | コーヒー豆通販サイト</title>

	<th:block th:replace="~{fragment/head ::styles}"></th:block>
</head>

<body class="coffee-wrapper">

	<!-- ヘッダー -->
	<div th:replace="fragment/header :: header"></div>

	<!-- メイン -->
	<div class="container mt-5">

		<h2 class="mb-4 text-center">会員登録</h2>

		<form th:action="@{/signup}" th:object="${signupForm}" method="post" class="mx-auto" style="max-width: 600px;">

			<!-- 氏名 -->
			<div class="mb-3">
				<label class="form-label">氏名</label>
				<input type="text" class="form-control" th:field="*{name}">
				<div class="text-danger" th:errors="*{name}"></div>
			</div>

			<!-- フリガナ -->
			<div class="mb-3">
				<label class="form-label">フリガナ</label>
				<input type="text" class="form-control" th:field="*{furigana}">
				<div class="text-danger" th:errors="*{furigana}"></div>
			</div>

			<!-- 郵便番号 -->
			<div class="mb-3">
				<label class="form-label">郵便番号</label>
				<input type="text" class="form-control" th:field="*{postalCode}">
				<div class="text-danger" th:errors="*{postalCode}"></div>
			</div>

			<!-- 住所 -->
			<div class="mb-3">
				<label class="form-label">住所</label>
				<input type="text" class="form-control" th:field="*{address}">
				<div class="text-danger" th:errors="*{address}"></div>
			</div>

			<!-- 電話番号 -->
			<div class="mb-3">
				<label class="form-label">電話番号</label>
				<input type="text" class="form-control" th:field="*{phoneNumber}">
				<div class="text-danger" th:errors="*{phoneNumber}"></div>
			</div>

			<!-- メール -->
			<div class="mb-3">
				<label class="form-label">メールアドレス</label>
				<input type="email" class="form-control" th:field="*{email}">
				<div class="text-danger" th:errors="*{email}"></div>
			</div>

			<!-- パスワード -->
			<div class="mb-3">
				<label class="form-label">パスワード</label>
				<input type="password" class="form-control" th:field="*{password}">
				<div class="text-danger" th:errors="*{password}"></div>
			</div>

			<!-- パスワード確認 -->
			<div class="mb-3">
				<label class="form-label">パスワード（確認）</label>
				<input type="password" class="form-control" th:field="*{passwordConfirmation}">
				<div class="text-danger" th:errors="*{passwordConfirmation}"></div>
			</div>

			<!-- ボタン -->
			<button type="submit" class="btn coffee-btn w-100">
				登録する
			</button>

		</form>

	</div>

	<!-- フッター -->
	<div th:replace="fragment/footer :: footer"></div>

</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<th:block th:replace="~{fragment/head :: meta}"></th:block>
	<title>ログイン</title>
	<th:block th:replace="~{fragment/head ::styles}"></th:block>
</head>

<body class="coffee-wrapper">

	<div th:replace="~{fragment/header :: header}"></div>

	<div class="container">

		<div class="row justify-content-center mt-5">

			<div class="col-md-5">

				<div class="card shadow-sm">

					<div class="card-body p-4">

						<h2 class="text-center mb-4">
							ログイン
						</h2>

						<form th:action="@{/login}" method="post">

							<div class="mb-3">
								<input type="text" name="username" class="form-control" placeholder="メールアドレス">
							</div>

							<div class="mb-3">
								<div class="input-group">

									<input type="password" id="password" name="password" class="form-control"
										placeholder="パスワード">

									<button type="button" id="toggleBtn" class="btn btn-outline-secondary"
										onclick="togglePassword()">

										<i id="eyeIcon" class="bi bi-eye"></i>

									</button>
								</div>
								<div class="text-center mt-4">

									<button type="submit" class="btn coffee-btn px-5">
										ログイン
									</button>
								</div>
							</div>

						</form>

					</div>

				</div>

			</div>

		</div>

	</div>

	<div th:replace="~{fragment/footer :: footer}"></div>

	<script>

		function togglePassword() {

			const passwordInput =
				document.getElementById("password");

			const eyeIcon =
				document.getElementById("eyeIcon");

			if (passwordInput.type === "password") {

				passwordInput.type = "text";

				eyeIcon.classList.remove("bi-eye");
				eyeIcon.classList.add("bi-eye-slash");

			} else {

				passwordInput.type = "password";

				eyeIcon.classList.remove("bi-eye-slash");
				eyeIcon.classList.add("bi-eye");

			}
		}

	</script>

</body>

</html>

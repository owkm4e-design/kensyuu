<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>ログイン</title>
</head>

<body>

	<h2>ログイン</h2>

	<form th:action="@{/login}" method="post">

		<div>
			<input type="text" name="username" placeholder="メールアドレス">
		</div>

		<div>
			<input type="password" name="password" placeholder="パスワード">
		</div>

		<button type="submit">ログイン</button>

	</form>

</body>

</html>

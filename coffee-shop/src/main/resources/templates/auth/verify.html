<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<th:block th:replace="~{fragment/head :: meta}"></th:block>
	<title>会員登録完了</title>
	<th:block th:replace="~{fragment/head :: styles}"></th:block>
</head>

<body class="coffee-wrapper">

	<div th:replace="~{fragment/header :: header}"></div>

	<div class="container mt-5 text-center">

		<div class="card shadow-sm p-5">

			<h2>メール認証</h2>

			<div th:if="${successMessage}">
				<p class="text-success" th:text="${successMessage}"></p>
			</div>

			<div th:if="${errorMessage}">
				<p class="text-danger" th:text="${errorMessage}"></p>
			</div>

			<a th:href="@{/login}" class="btn coffee-btn mt-3">
				ログインへ
			</a>

		</div>

	</div>

	<div th:replace="~{fragment/footer :: footer}"></div>

</body>

</html>

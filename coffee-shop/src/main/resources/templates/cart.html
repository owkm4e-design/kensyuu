<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<th:block th:replace="~{fragment/head :: meta}"></th:block>

	<title>カート</title>

	<th:block th:replace="~{fragment/head :: meta}"></th:block>
</head>

<body class="coffee-wrapper">

	<!-- ヘッダー -->
	<div th:replace="fragment/header :: header"></div>

	<div class="container mt-4">

		<h1>ショッピングカート</h1>

		<table class="table table-bordered mt-3">

			<tr>
				<th>商品名</th>
				<th>内容量</th>
				<th>数量</th>
				<th>価格</th>
				<th>操作</th>
			</tr>

			<tr th:each="item : ${cartItems}">

				<td th:text="${item.product.productName}"></td>

				<td>
					<span th:text="${item.gram}"></span>g
				</td>

				<td th:text="${item.quantity}"></td>

				<td>
					¥<span th:text="${item.product.price * item.quantity}"></span>
				</td>

				<td>
					<form th:action="@{/cart/delete}" method="post">
						<input type="hidden" name="cartItemId" th:value="${item.id}">
						<button type="submit" class="btn coffee-btn-danger btn-sm">
							削除
						</button>
					</form>
				</td>

			</tr>

		</table>

		<h2 class="mt-4">
			合計：¥<span th:text="${totalPrice}"></span>
		</h2>

		<form th:action="@{/cart/order}" method="post">
			<button type="submit" class="btn coffee-btn w-100 mt-3">
				注文確定
			</button>
		</form>

		<a th:href="@{/}" class="d-block mt-3 coffee-page-link">
			商品一覧へ戻る
		</a>

	</div>

	<!-- フッター -->
	<div th:replace="fragment/footer :: footer"></div>

</body>

</html>

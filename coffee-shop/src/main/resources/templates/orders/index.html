<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<th:block th:replace="~{fragment/head :: meta}"></th:block>

	<title>注文履歴 | コーヒー豆通販サイト</title>

	<th:block th:replace="~{fragment/head :: styles}"></th:block>
</head>

<body class="coffee-wrapper">

	<div th:replace="~{fragment/header :: header}"></div>

	<div class="container mt-5">

		<h2 class="text-center mb-4">
			注文履歴
		</h2>

		<div class="card shadow-sm">

			<div class="card-body">

				<table class="table table-hover">

					<thead>
						<tr>
							<th>注文番号</th>
							<th>注文日</th>
							<th>合計金額</th>
							<th>注文状況</th>
							<th></th>
						</tr>
					</thead>

					<tbody>

						<tr th:each="order : ${orders}">

							<td th:text="${order.id}"></td>

							<td th:text="${#temporals.format(order.createdAt,'yyyy/MM/dd HH:mm')}"></td>

							<td th:text="${order.totalPrice + ' 円'}"></td>

							<td th:text="${order.status}"></td>

							<td>
								<a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-outline-secondary btn-sm">
									詳細
								</a>
							</td>

						</tr>

					</tbody>

				</table>

			</div>

		</div>

	</div>

	<div th:replace="~{fragment/footer :: footer}"></div>

</body>

</html>
